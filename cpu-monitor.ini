[hotkey]
; 修饰键（用 + 分隔），支持: Ctrl, Shift, Alt, Win
; 设为 "None" 可禁用热键
mod = Ctrl+Shift

; 按键名称，支持:
;   单字符: A-Z, 0-9
;   功能键: F1-F12
;   特殊键: Esc, Tab, Space, Enter, Backspace, Delete, Insert
;          Home, End, PgUp, PgDn, Up, Down, Left, Right
key = Q

; 示例:
;   mod = Ctrl+Alt  ; key = X     → Ctrl+Alt+X
;   mod = Win       ; key = F3    → Win+F3
;   mod = Shift     ; key = Esc   → Shift+Esc
;   mod = None      ; key = F12   → F12 (无修饰键)
;   mod = None      ; key = None  → 完全禁用热键，用任务管理器结束进程
